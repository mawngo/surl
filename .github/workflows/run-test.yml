name: run-test

on:
  pull_request:
  push:
    branches: [ 'main', 'develop' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run Test
        run: go test ./... -count=3